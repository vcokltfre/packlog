services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: packlog
      POSTGRES_PASSWORD: packlog
      POSTGRES_DB: packlog
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: .
    ports:
      - "80:8080"
    environment:
      DATABASE_URL: postgres://packlog:packlog@database:5432/packlog
    depends_on:
      - database
    env_file:
      - .env

volumes:
  db_data:
